<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — 波勢金融分析平台</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      brand: { DEFAULT:'#3b82f6', light:'#60a5fa', dark:'#1d4ed8' },
      accent: { DEFAULT:'#14b8a6', light:'#2dd4bf' },
    }}}};
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin:0; min-height:100vh; color:#e2e8f0; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif; background:#05080f; overflow-x:hidden; }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }
    .bg-scene { position:fixed; inset:0; z-index:0; overflow:hidden; background:radial-gradient(ellipse 100% 80% at 40% 30%,#5c1a3a 0%,#2a0a1e 30%,#0a0610 60%,#05080f 100%); }
    .bg-scene::before { content:''; position:absolute; inset:0; background:url('bg-green.jpg') center/cover no-repeat; opacity:0.55; will-change:transform,opacity; animation:bg-drift 40s ease-in-out infinite alternate; transition:opacity 0.6s; }
    .bg-scene::after { z-index:1; }
    .bg-scene .bg-layer-red { position:absolute; inset:0; background:url('bg-red.jpg') center/cover no-repeat; opacity:0; will-change:transform,opacity; animation:bg-drift 40s ease-in-out infinite alternate; transition:opacity 0.6s; }
    .bg-scene.bearish::before { opacity:0; }
    .bg-scene.bearish .bg-layer-red { opacity:0.55; }
    .bg-scene::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 30%,transparent 0%,rgba(5,8,15,0.5) 50%,rgba(5,8,15,0.85) 100%); }
    @keyframes bg-drift { 0%{transform:scale(1) translate(0,0)} 50%{transform:scale(1.08) translate(-1%,1%)} 100%{transform:scale(1.04) translate(0.5%,-0.5%)} }
    .light-beam { position:fixed; top:0; left:50%; transform:translateX(-50%); width:1100px; height:500px; z-index:1; pointer-events:none; background:conic-gradient(from 90deg at 50% -8%,transparent 28%,rgba(180,80,150,0.06) 35%,rgba(200,100,180,0.12) 42%,rgba(160,60,200,0.08) 48%,rgba(100,60,220,0.05) 54%,transparent 62%); filter:blur(2px); }
    .light-beam::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:600px; height:2px; background:linear-gradient(90deg,transparent 5%,rgba(200,100,180,0.4) 25%,rgba(220,130,200,0.7) 50%,rgba(200,100,180,0.4) 75%,transparent 95%); box-shadow:0 0 40px 12px rgba(180,80,150,0.12),0 0 80px 30px rgba(160,60,200,0.06); }
    .glass { position:relative; overflow:hidden; background:rgba(12,15,25,0.6); backdrop-filter:blur(16px) saturate(1.3); -webkit-backdrop-filter:blur(16px) saturate(1.3); border:1.5px solid rgba(255,255,255,0.08); border-radius:18px; box-shadow:inset 0 1px 0 0 rgba(255,255,255,0.07),inset 0 -1px 0 0 rgba(0,0,0,0.2),0 0 0 1px rgba(255,255,255,0.03),0 2px 8px rgba(0,0,0,0.3),0 8px 32px rgba(0,0,0,0.25); transition:border-color 0.3s,box-shadow 0.3s; }
    .glass:hover { border-color:rgba(255,255,255,0.14); box-shadow:inset 0 1px 0 0 rgba(255,255,255,0.12),inset 0 -1px 0 0 rgba(0,0,0,0.2),0 0 0 1px rgba(255,255,255,0.06),0 2px 8px rgba(0,0,0,0.3),0 12px 48px rgba(0,0,0,0.3); }
    .glass::before { content:''; position:absolute; top:0; left:10%; right:10%; height:1px; border-radius:0 0 50% 50%; pointer-events:none; z-index:1; background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0.3) 50%,rgba(255,255,255,0.15) 80%,transparent 100%); box-shadow:0 0 12px 2px rgba(200,160,255,0.08); }
    .glass::after { content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none; background:linear-gradient(165deg,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0.01) 25%,transparent 50%); }
    .nav-glass { background:rgba(8,10,20,0.65); backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2); border-bottom:1.5px solid rgba(255,255,255,0.06); box-shadow:inset 0 -1px 0 rgba(0,0,0,0.3),0 4px 24px rgba(0,0,0,0.3); }
    .spin { animation:spin 1s linear infinite; } @keyframes spin { to{transform:rotate(360deg)} }
    .pulse-dot { width:8px; height:8px; border-radius:50%; animation:pulse-ring 2s ease-out infinite; } @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(74,222,128,0.5)} 70%{box-shadow:0 0 0 5px transparent} 100%{box-shadow:0 0 0 0 transparent} }
    .score-bar { height:6px; border-radius:3px; background:rgba(255,255,255,0.06); overflow:hidden; } .score-bar-fill { height:100%; border-radius:3px; transition:width 0.6s ease-out; }
    .check-item { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:10px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); position:relative; }
    .check-item.pass { border-left:3px solid #4ade80; } .check-item.fail { border-left:3px solid #f87171; } .check-item.warn { border-left:3px solid #facc15; }
    .has-tip { cursor:help; } .has-tip .tip-box { display:none; position:absolute; left:12px; right:12px; bottom:calc(100% + 8px); background:rgba(5,8,15,0.92); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px 14px; font-size:12px; color:#cbd5e1; line-height:1.6; z-index:40; box-shadow:0 8px 32px rgba(0,0,0,0.5); pointer-events:none; }
    .has-tip .tip-box::after { content:''; position:absolute; bottom:-5px; left:24px; border-left:5px solid transparent; border-right:5px solid transparent; border-top:5px solid rgba(255,255,255,0.1); }
    .has-tip:hover .tip-box { display:block; }
    .tab-btn { padding:6px 18px; border-radius:8px; font-weight:600; font-size:13px; cursor:pointer; transition:all 0.2s; border:1px solid transparent; }
    .tab-btn.active { background:rgba(74,222,128,0.15); color:#4ade80; border-color:rgba(74,222,128,0.3); } .tab-btn:not(.active) { background:rgba(255,255,255,0.03); color:#64748b; border-color:rgba(255,255,255,0.05); } .tab-btn:not(.active):hover { background:rgba(255,255,255,0.06); color:#94a3b8; }
    .lang-btn { padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.4); }
    .lang-btn.active { background:rgba(74,222,128,0.15); color:#4ade80; border-color:rgba(74,222,128,0.3); }
    /* 指標問號按鈕 */
    .info-btn { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:50%; border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.25); font-size:9px; font-weight:700; cursor:pointer; transition:all 0.2s; margin-left:4px; vertical-align:middle; line-height:1; flex-shrink:0; }
    .info-btn:hover { border-color:rgba(255,255,255,0.3); color:rgba(255,255,255,0.6); background:rgba(255,255,255,0.05); }
    /* 指標說明彈窗 */
    .metric-modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
    .metric-modal-overlay.show { display:flex; }
    .metric-modal { background:rgba(10,12,22,0.95); backdrop-filter:blur(24px); border:1.5px solid rgba(255,255,255,0.1); border-radius:16px; padding:24px 28px; max-width:520px; width:92%; max-height:85vh; overflow-y:auto; box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 16px 64px rgba(0,0,0,0.6); position:relative; }
    .metric-modal::before { content:''; position:absolute; top:0; left:15%; right:15%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25) 50%,transparent); }
    .metric-modal h4 { font-size:15px; font-weight:700; color:#e2e8f0; margin:0 0 12px; }
    .metric-modal p { font-size:12px; color:rgba(255,255,255,0.5); line-height:1.7; margin:0 0 12px; }
    .metric-modal .range-row { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:8px; margin-bottom:4px; font-size:11px; }
    .metric-modal .range-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .metric-modal .close-btn { position:absolute; top:12px; right:14px; width:24px; height:24px; border-radius:6px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.4); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .metric-modal .close-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .signal-box { padding:16px; border-radius:12px; text-align:center; border:1px solid; }
    .signal-tranche1 { background:rgba(59,130,246,0.08); border-color:rgba(59,130,246,0.3); } .signal-tranche2 { background:rgba(20,184,166,0.08); border-color:rgba(20,184,166,0.3); } .signal-tranche3 { background:rgba(168,85,247,0.08); border-color:rgba(168,85,247,0.3); } .signal-observe { background:rgba(250,204,21,0.06); border-color:rgba(250,204,21,0.25); } .signal-hedge { background:rgba(248,113,113,0.08); border-color:rgba(248,113,113,0.3); }
    .metric-cell { padding:8px 0; border-right:1px solid rgba(255,255,255,0.04); } .metric-cell:last-child { border-right:none; }
    @media (max-width:1279px) { .metric-cell:nth-child(4n) { border-right:none; } } @media (max-width:767px) { .metric-cell:nth-child(2n) { border-right:none; } }
    .metric-label { font-size:10px; color:rgba(255,255,255,0.3); margin-bottom:4px; letter-spacing:0.05em; }
    .legend-dot { display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; }
    .exit-card { padding:14px; border-radius:10px; border:1px solid rgba(255,255,255,0.05); }
    details summary { cursor:pointer; list-style:none; } details summary::-webkit-details-marker { display:none; }
    .cursor-glow { position:fixed; top:0; left:0; pointer-events:none; z-index:3; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(180,120,255,0.07) 0%,rgba(140,80,220,0.04) 30%,transparent 70%); opacity:0; will-change:transform,opacity; transition:opacity 0.35s; } .cursor-glow.active { opacity:1; }
    .content-layer { position:relative; z-index:4; }
  </style>
</head>
<body>
  <div class="bg-scene" id="bgScene"><div class="bg-layer-red"></div></div>
  <div class="light-beam"></div>
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="content-layer">

    <!-- 導覽列 -->
    <nav class="nav-glass sticky top-0 z-50 px-6 py-4">
      <div class="max-w-[1520px] mx-auto flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-3">
          <img src="logo.png" alt="Pulse" class="w-14 h-14 rounded-lg object-contain" id="navLogo">
          <div>
            <h1 class="text-base font-semibold text-white/90 leading-tight tracking-tight" id="navTitle">Pulse</h1>
            <p class="text-[10px] text-white/25 tracking-wide" id="navSubtitle">波勢金融分析平台</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-1.5" id="symbolTabs">
            <button class="tab-btn active" data-symbol="SPY" onclick="switchSymbol('SPY')">SPY</button>
            <button class="tab-btn" data-symbol="QQQ" onclick="switchSymbol('QQQ')">QQQ</button>
          </div>
          <div class="flex items-center gap-1" id="langTabs">
            <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中</button>
            <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <a href="backtest.html" class="flex items-center gap-2 px-3 py-1.5 bg-white/[0.04] hover:bg-white/[0.08] text-white/40 hover:text-white/70 rounded-lg text-xs transition-all border border-white/[0.05]">
            <i data-lucide="flask-conical" class="w-3 h-3"></i>
            <span data-i18n="backtestLink">回測中心</span>
          </a>
          <div class="flex items-center gap-2 text-xs">
            <div id="statusDot" class="pulse-dot bg-yellow-400"></div>
            <span id="statusText" class="text-white/40">載入中...</span>
          </div>
          <span id="lastUpdate" class="text-[11px] text-white/20 hidden sm:inline"></span>
          <button id="refreshBtn" onclick="refreshData()" class="flex items-center gap-2 px-4 py-2 bg-white/[0.06] hover:bg-white/[0.1] text-white/70 hover:text-white rounded-lg text-xs font-medium transition-all border border-white/[0.06]">
            <i data-lucide="refresh-cw" class="w-3.5 h-3.5" id="refreshIcon"></i>
            <span data-i18n="refresh">刷新</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-[1520px] mx-auto px-6 pt-8 pb-12">
      <!-- 指標面板 -->
      <div class="glass p-5 mb-5">
        <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-x-5 gap-y-4">
          <div class="metric-cell"><div class="metric-label" data-i18n="close">收盤價</div><div class="text-xl font-bold text-white/90" id="cardPrice">--</div><div class="text-xs mt-0.5" id="cardPriceChange">--</div></div>
          <div class="metric-cell"><div class="metric-label">Regime Score <span class="info-btn" onclick="showMetricInfo('regime')">?</span></div><div class="text-xl font-bold" id="cardRegime">--</div><div class="text-xs mt-0.5" id="cardRegimeLabel">--</div></div>
          <div class="metric-cell"><div class="metric-label">RSI(2) <span class="info-btn" onclick="showMetricInfo('rsi2')">?</span></div><div class="text-xl font-bold" id="cardRSI2">--</div><div class="text-xs mt-0.5" id="cardRSI2Label">--</div></div>
          <div class="metric-cell"><div class="metric-label"><span data-i18n="rsi2consec">RSI(2) 連續超賣</span> <span class="info-btn" onclick="showMetricInfo('rsi2days')">?</span></div><div class="text-xl font-bold" id="cardRSI2Days">--</div><div class="text-xs mt-0.5" id="cardRSI2DaysLabel">--</div></div>
          <div class="metric-cell"><div class="metric-label">IBS <span class="info-btn" onclick="showMetricInfo('ibs')">?</span></div><div class="text-xl font-bold" id="cardIBS">--</div><div class="text-xs mt-0.5" id="cardIBSLabel">--</div></div>
          <div class="metric-cell"><div class="metric-label"><span data-i18n="deviation">SMA20 乖離率</span> <span class="info-btn" onclick="showMetricInfo('deviation')">?</span></div><div class="text-xl font-bold" id="cardDeviation">--</div><div class="text-xs mt-0.5" id="cardDeviationLabel">--</div></div>
          <div class="metric-cell"><div class="metric-label">VIX <span class="info-btn" onclick="showMetricInfo('vix')">?</span></div><div class="text-xl font-bold" id="cardVIX">--</div><div class="text-xs mt-0.5" id="cardVIXLabel">--</div></div>
          <div class="metric-cell"><div class="metric-label"><span data-i18n="signal">當前訊號</span> <span class="info-btn" onclick="showMetricInfo('signal')">?</span></div><div class="text-xl font-bold" id="cardSignal">--</div><div class="text-xs mt-0.5" id="cardSignalLabel">--</div></div>
        </div>
      </div>
      <!-- 指標說明彈窗 -->
      <div class="metric-modal-overlay" id="metricModal" onclick="if(event.target===this)this.classList.remove('show')">
        <div class="metric-modal">
          <button class="close-btn" onclick="document.getElementById('metricModal').classList.remove('show')">✕</button>
          <div id="metricModalContent"></div>
        </div>
      </div>
      <!-- 圖表 + Regime -->
      <div class="grid grid-cols-1 xl:grid-cols-12 gap-3 mb-5">
        <div class="xl:col-span-8 glass p-5">
          <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
            <div class="flex items-center gap-2"><i data-lucide="candlestick-chart" class="w-4 h-4 text-brand-light/60"></i><span class="font-medium text-sm text-white/70" id="chartTitle">SPY</span></div>
            <div class="flex items-center gap-3 text-[11px] text-white/25"><span class="legend-dot" style="background:#f59e0b"></span>SMA50 <span class="legend-dot" style="background:#3b82f6"></span>SMA200 <span class="mx-1 text-white/10">|</span><span data-i18n="range2y">近兩年</span></div>
          </div>
          <div id="chartContainer" style="height:460px;width:100%;"></div>
        </div>
        <div class="xl:col-span-4 glass p-5 flex flex-col">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-medium text-sm text-white/70 flex items-center gap-2"><i data-lucide="layers" class="w-4 h-4 text-brand-light/50"></i><span data-i18n="regimeBreakdown">Regime Score 分解</span></h3>
            <span class="text-[10px] text-white/20" data-i18n="hoverTip">hover 查看說明</span>
          </div>
          <div class="mb-3"><div class="flex justify-between text-xs mb-1.5"><span class="text-white/40" data-i18n="total">總分</span><span id="regimeScoreNum" class="font-bold text-white/70">--</span></div><div class="score-bar"><div id="regimeScoreBar" class="score-bar-fill bg-brand" style="width:0%"></div></div></div>
          <div class="space-y-1.5 text-sm flex-1 overflow-y-auto pr-1" id="regimeBreakdown" style="max-height:380px;"><div class="text-white/20 text-center py-8 text-xs" data-i18n="loading">等待數據載入...</div></div>
        </div>
      </div>
      <!-- 檢核 + 訊號 + 出場 -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3 mb-5">
        <div class="glass p-5">
          <h3 class="font-medium text-sm text-white/70 mb-3 flex items-center gap-2"><i data-lucide="clipboard-check" class="w-4 h-4 text-accent/50"></i><span data-i18n="checklist">量化條件檢核表</span></h3>
          <div class="space-y-1.5 max-h-[400px] overflow-y-auto pr-1" id="checklist"><div class="text-white/20 text-center py-8 text-xs" data-i18n="loading">等待數據載入...</div></div>
        </div>
        <div class="glass p-5">
          <h3 class="font-medium text-sm text-white/70 mb-3 flex items-center gap-2"><i data-lucide="target" class="w-4 h-4 text-purple-400/60"></i><span data-i18n="signalLevel">進場訊號層級</span></h3>
          <div id="signalPanel"><div class="text-white/20 text-center py-8 text-xs" data-i18n="loading">等待數據載入...</div></div>
          <div id="blockReasonsCard" class="mt-3" style="display:none;"><div class="text-xs text-red-400/70 font-medium mb-2 flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i><span data-i18n="blockTitle">不建議進場的原因</span></div><div id="blockReasons" class="space-y-1 text-xs"></div></div>
        </div>
        <div class="glass p-5">
          <h3 class="font-medium text-sm text-white/70 mb-3 flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4 text-yellow-400/50"></i><span data-i18n="exitRef">持倉出場參考</span></h3>
          <div id="exitPanel"><div class="text-white/20 text-center py-8 text-xs" data-i18n="loading">等待數據載入...</div></div>
        </div>
      </div>
      <!-- 底部說明 -->
      <div class="glass p-5">
        <details>
          <summary class="flex items-center justify-between"><span class="font-medium text-sm text-white/50 flex items-center gap-2"><i data-lucide="info" class="w-4 h-4 text-white/20"></i><span data-i18n="infoTitle">指標說明與風險提醒</span></span><i data-lucide="chevron-down" class="w-4 h-4 text-white/20"></i></summary>
          <div class="mt-5 grid grid-cols-1 md:grid-cols-2 gap-8 text-xs text-white/35 leading-relaxed" id="infoContent"></div>
        </details>
      </div>
    </main>
  </div>

  <script>
  (function(){
    'use strict';

    // ==========================================================
    // i18n 多語系
    // ==========================================================
    let lang = 'zh';
    const I = {
      zh: {
        navSubtitle:'波勢金融分析平台', backtestLink:'回測中心', refresh:'刷新', close:'收盤價', rsi2consec:'RSI(2) 連續超賣',
        deviation:'SMA20 乖離率', signal:'當前訊號', range2y:'近兩年', regimeBreakdown:'Regime Score 分解',
        hoverTip:'hover 查看說明', total:'總分', loading:'等待數據載入...', checklist:'量化條件檢核表',
        signalLevel:'進場訊號層級', blockTitle:'不建議進場的原因', exitRef:'持倉出場參考',
        infoTitle:'指標說明與風險提醒', connected:'已連線', failed:'失敗', loadingStatus:'載入中...',
        update:'更新',
        // 卡片標籤

    let currentSymbol='SPY', chartInstance=null, candleSeries=null, sma50Series=null, sma200Series=null;
    let isLoading=false, resizeObserver=null;
    // 快取最近一次計算結果，切換語言時重用
    let lastData=null, lastRR=null, lastSig=null, lastVix=null, lastVF=null, lastExit=null;
    const BREADTH_PROXY={SPY:'RSP',QQQ:'QQEW'};

    const REGIME_TIP_KEYS={
      'Close > SMA200':'tipSMA200','Close > SMA50':'tipSMA50',

    // === 技術指標 ===
    function calcSMA(d,p){const r=[];for(let i=0;i<d.length;i++){if(i<p-1){r.push(null);continue;}let s=0;for(let j=i-p+1;j<=i;j++)s+=d[j];r.push(s/p);}return r;}
    function calcRSI(c,p){const r=new Array(c.length).fill(null);if(c.length<p+1)return r;let ag=0,al=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];if(d>0)ag+=d;else al+=Math.abs(d);}ag/=p;al/=p;r[p]=al===0?100:100-100/(1+ag/al);for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?Math.abs(d):0))/p;r[i]=al===0?100:100-100/(1+ag/al);}return r;}
    function calcWilliamsR(h,l,c,p){const r=new Array(c.length).fill(null);for(let i=p-1;i<c.length;i++){let hh=-Infinity,ll=Infinity;for(let j=i-p+1;j<=i;j++){if(h[j]>hh)hh=h[j];if(l[j]<ll)ll=l[j];}r[i]=hh===ll?0:((hh-c[i])/(hh-ll))*-100;}return r;}
    function calcATR(h,l,c,p){const r=new Array(c.length).fill(null);if(c.length<p+1)return r;const tr=[h[0]-l[0]];for(let i=1;i<c.length;i++)tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));let a=0;for(let i=0;i<p;i++)a+=tr[i];a/=p;r[p-1]=a;for(let i=p;i<c.length;i++){a=(a*(p-1)+tr[i])/p;r[i]=a;}return r;}
    function calcRealizedVol(c,p){p=p||20;const r=new Array(c.length).fill(null);const lr=[0];for(let i=1;i<c.length;i++)lr.push(Math.log(c[i]/c[i-1]));for(let i=p;i<c.length;i++){const s=lr.slice(i-p+1,i+1);const m=s.reduce((a,b)=>a+b,0)/s.length;const v=s.reduce((a,b)=>a+(b-m)**2,0)/(s.length-1);r[i]=Math.sqrt(v)*Math.sqrt(252)*100;}return r;}
    function calcBBLower(c,p,m){const sma=calcSMA(c,p);const r=new Array(c.length).fill(null);for(let i=p-1;i<c.length;i++){let sq=0;for(let j=i-p+1;j<=i;j++)sq+=(c[j]-sma[i])**2;r[i]=sma[i]-m*Math.sqrt(sq/p);}return r;}
    function percentileRank(d,idx,lb){const s=[];for(let i=Math.max(0,idx-lb+1);i<=idx;i++){if(d[i]!=null)s.push(d[i]);}if(s.length<20)return null;const c=d[idx];if(c==null)return null;return(s.filter(v=>v<c).length/s.length)*100;}
    function calcIBS(h,l,c){const r=new Array(c.length).fill(null);for(let i=0;i<c.length;i++){const rng=h[i]-l[i];r[i]=rng===0?0.5:(c[i]-l[i])/rng;}return r;}
    function calcConsecutiveDays(a,thr){let ct=0;for(let i=a.length-1;i>=0;i--){if(a[i]!=null&&a[i]<thr)ct++;else break;}return ct;}
    function calcDeviation(c,p){const sma=calcSMA(c,p);const n=c.length;if(sma[n-1]==null||sma[n-1]===0)return null;return((c[n-1]-sma[n-1])/sma[n-1])*100;}

    // === 資料抓取 ===
    async function fetchWithRetry(sym){
      const base=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?range=2y&interval=1d`;
      const px=[u=>u,u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`];
      for(const mk of px){try{const r=await fetch(mk(base),{signal:AbortSignal.timeout(15000)});if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();if(j.chart?.result?.length>0)return j;throw new Error('bad');}catch(e){console.warn(`[D] ${sym}:`,e.message);}}
      throw new Error(`Cannot fetch ${sym}`);
    }
    async function fetchVIX(){try{const d=await fetchWithRetry('^VIX');const c=d.chart.result[0].indicators.quote[0].close.filter(v=>v!=null);const s=calcSMA(c,10);return{close:c[c.length-1],sma10:s[s.length-1]||c[c.length-1]};}catch(e){return null;}}
    async function fetchBreadth(sym){const p=BREADTH_PROXY[sym];if(!p)return null;try{const d=await fetchWithRetry(p);const c=d.chart.result[0].indicators.quote[0].close.filter(v=>v!=null);const s=calcSMA(c,50);return{close:c[c.length-1],sma50:s[s.length-1]||c[c.length-1]};}catch(e){return null;}}
    function parseData(raw){const res=raw.chart.result[0];const ts=res.timestamp,q=res.indicators.quote[0];const cl={dates:[],opens:[],highs:[],lows:[],closes:[],volumes:[]};for(let i=0;i<ts.length;i++){const o=q.open[i],h=q.high[i],l=q.low[i],c=q.close[i];if(o==null||h==null||l==null||c==null||h===0||l===0)continue;cl.dates.push(ts[i]);cl.opens.push(o);cl.highs.push(h);cl.lows.push(l);cl.closes.push(c);cl.volumes.push(q.volume[i]||0);}return cl;}

    // === Regime Score ===
    function calcRegimeScore(data,vix,br){
      const c=data.closes,h=data.highs,l=data.lows,n=c.length,lat=c[n-1];
      const s200=calcSMA(c,200),s50=calcSMA(c,50),rv=calcRealizedVol(c,20),atr=calcATR(h,l,c,14);
      const ls200=s200[n-1],ls50=s50[n-1];const bd=[];let tot=0;
      const mk=(catKey,labKey,lab,pass,pts,max,det,tipKey)=>{if(pass)tot+=pts;bd.push({catKey,labKey,label:lab,pass,pts:pass?pts:0,max,detail:det,tipKey});};
      mk('catTrend','','Close > SMA200',ls200!=null&&lat>ls200,15,15,`Close=${lat.toFixed(2)}, SMA200=${ls200!=null?ls200.toFixed(2):'N/A'}`,'tipSMA200');
      mk('catTrend','','Close > SMA50',ls50!=null&&lat>ls50,10,10,`Close=${lat.toFixed(2)}, SMA50=${ls50!=null?ls50.toFixed(2):'N/A'}`,'tipSMA50');
      mk('catTrend','goldenCross','',ls50!=null&&ls200!=null&&ls50>ls200,10,10,`SMA50=${ls50!=null?ls50.toFixed(2):'N/A'}, SMA200=${ls200!=null?ls200.toFixed(2):'N/A'}`,'tipGolden');
      const s200a=n>20?s200[n-21]:null;mk('catSlope','sma200slope','',ls200!=null&&s200a!=null&&ls200>s200a,10,10,`${lang==='zh'?'今日':'Today'}=${ls200!=null?ls200.toFixed(2):'N/A'}, ${lang==='zh'?'20日前':'20d ago'}=${s200a!=null?s200a.toFixed(2):'N/A'}`,'tipSlope200');
      const s50a=n>10?s50[n-11]:null;mk('catSlope','sma50slope','',ls50!=null&&s50a!=null&&ls50>s50a,10,10,`${lang==='zh'?'今日':'Today'}=${ls50!=null?ls50.toFixed(2):'N/A'}, ${lang==='zh'?'10日前':'10d ago'}=${s50a!=null?s50a.toFixed(2):'N/A'}`,'tipSlope50');
      const lrv=rv[n-1],rvP=percentileRank(rv,n-1,252);mk('catVol','rvLabel','',rvP!=null&&rvP<80,10,10,`RV=${lrv!=null?lrv.toFixed(1)+'%':'N/A'}, pctile=${rvP!=null?rvP.toFixed(0)+'%':'N/A'}`,'tipRV');
      const la=atr[n-1],ap=la!=null?(la/lat)*100:null,aa=atr.map((v,i)=>v!=null&&c[i]>0?(v/c[i])*100:null),aP=percentileRank(aa,n-1,252);
      mk('catVol','atrLabel','',aP!=null&&aP<80,10,10,`ATR%=${ap!=null?ap.toFixed(2)+'%':'N/A'}, pctile=${aP!=null?aP.toFixed(0)+'%':'N/A'}`,'tipATR');
      if(br&&br.close!=null&&br.sma50!=null){const p=BREADTH_PROXY[currentSymbol];mk('catRisk','',`${p} > ${lang==='zh'?'其':'its'} SMA50`,br.close>br.sma50,10,10,`${p}=${br.close.toFixed(2)}, SMA50=${br.sma50.toFixed(2)}`,'tipBreadth');}
      else{bd.push({catKey:'catRisk',labKey:'',label:`Breadth (${BREADTH_PROXY[currentSymbol]})`,pass:null,pts:0,max:10,detail:t('unavailable'),tipKey:''});}
      if(vix&&vix.close!=null){mk('catRisk','','VIX < 25',vix.close<25,5,5,`VIX=${vix.close.toFixed(2)}`,'tipVIX25');mk('catRisk','vixLow','',vix.close<20,5,5,`VIX=${vix.close.toFixed(2)}`,'tipVIX20');const sr=vix.sma10>0?vix.close/vix.sma10:1;mk('catRisk','vixSpike','',sr<1.15,5,5,`${t('chkRatio')}=${sr.toFixed(3)}`,'tipVIXSpike');}
      else{bd.push({catKey:'catRisk',labKey:'',label:'VIX',pass:null,pts:0,max:15,detail:t('unavailable'),tipKey:''});}
      return{total:Math.min(tot,100),breakdown:bd,sma200:s200,sma50:s50,realVol:rv,atr14:atr,latestRV:lrv,rvPctile:rvP,atrPctile:aP};
    }

    function calcVolFilter(vix,rr){
      const r={pass:true,vixStatus:t('noData'),vixSpike:false,rvStatus:t('normal'),blocked:false,reasons:[]};
      if(vix&&vix.close!=null){const v=vix.close;if(v<25)r.vixStatus=t('normal');else if(v<32){r.vixStatus=t('alert');r.reasons.push(`VIX=${v.toFixed(1)} ${t('alert')}(25–32)`);}else{r.vixStatus=t('highRisk');r.blocked=true;r.pass=false;r.reasons.push(`VIX=${v.toFixed(1)}≥32`);}const sr=vix.sma10>0?vix.close/vix.sma10:1;if(sr>1.25){r.vixSpike=true;r.reasons.push(`VIX spike ${sr.toFixed(2)}>1.25`);}}
      if(rr.rvPctile!=null){if(rr.rvPctile>=90){r.rvStatus=lang==='zh'?'極高':'Extreme';r.blocked=true;r.pass=false;r.reasons.push(`RV pctile ${rr.rvPctile.toFixed(0)}%≥90th`);}else if(rr.rvPctile>=85){r.rvStatus=lang==='zh'?'高':'High';r.reasons.push(`RV pctile ${rr.rvPctile.toFixed(0)}%≥85th`);}}
      return r;
    }

    function calcSignal(data,score,vf){
      const c=data.closes,h=data.highs,l=data.lows,n=c.length,lat=c[n-1];
      const r2=calcRSI(c,2),r5=calcRSI(c,5),wr=calcWilliamsR(h,l,c,2),bb=calcBBLower(c,5,2),s5=calcSMA(c,5),ibs=calcIBS(h,l,c);
      const lr2=r2[n-1],lr5=r5[n-1],lwr=wr[n-1],lbb=bb[n-1],ls5=s5[n-1],libs=ibs[n-1];
      const days=calcConsecutiveDays(r2,10),dev=calcDeviation(c,20);
      const aux=[
        {labelKey:'auxWR',pass:lwr!=null&&lwr<-80,value:lwr},
        {labelKey:'auxRSI5',pass:lr5!=null&&lr5<35,value:lr5},
        {labelKey:'auxBB',pass:lbb!=null&&lat<lbb,value:lbb},
        {labelKey:'auxIBS',pass:libs!=null&&libs<0.2,value:libs},
        {labelKey:'auxDev',pass:dev!=null&&dev<-3,value:dev},
        {labelKey:'auxConsec',pass:days>=2,value:days},
      ];
      const br=[];let sl='none',stKey='',sc='',sp='';
      if(score<50){sl='hedge';stKey='hedge1';sc='signal-hedge';sp='0%';br.push(`Regime=${score}(<50) Risk-Off`);}
      else if(vf.blocked){sl='hedge';stKey='hedge2';sc='signal-hedge';sp='0%';vf.reasons.forEach(r=>br.push(r));}
      else if(score>=75&&lr2!=null&&lr2<5){sl='tranche3';stKey='tranche3';sc='signal-tranche3';sp='100%';}
      else if(score>=70&&lr2!=null&&lr2<8){sl='tranche2';stKey='tranche2';sc='signal-tranche2';sp='60%';}
      else if(score>=70&&lr2!=null&&lr2<15){sl='tranche1';stKey='tranche1';sc='signal-tranche1';sp='30%';}
      else if(score>=50){sl='observe';stKey='observe';sc='signal-observe';sp='';if(score<70)br.push(`Regime=${score}(50–69) Caution`);if(lr2!=null&&lr2>=15)br.push(`RSI(2)=${lr2.toFixed(1)}≥15 ${t('notRecommended')}`);}
      return{signalLevel:sl,signalTextKey:stKey,signalClass:sc,signalPosition:sp,rsi2:lr2,rsi5:lr5,wr2:lwr,bbLower:lbb,sma5:ls5,ibs:libs,rsi2ConsecDays:days,deviation:dev,auxChecks:aux,blockReasons:br,auxPassCount:aux.filter(a=>a.pass).length};
    }

    function calcExit(data,rr,sig){
      const c=data.closes,n=c.length,lat=c[n-1],items=[];
      const mr=(sig.rsi2!=null&&sig.rsi2>65)||(sig.sma5!=null&&lat>sig.sma5);
      if(mr){const rs=[];if(sig.rsi2!=null&&sig.rsi2>65)rs.push(`RSI(2)=${sig.rsi2.toFixed(1)}>65`);if(sig.sma5!=null&&lat>sig.sma5)rs.push('Close>SMA5');items.push({icon:'🟢',labelKey:'mrDone',detail:rs.join(', '),status:'exit'});}
      else items.push({icon:'🔵',labelKey:'mrProgress',detail:`RSI(2)=${sig.rsi2!=null?sig.rsi2.toFixed(1):'N/A'}`,status:'hold'});
      items.push({icon:'⏱️',labelKey:'timeRisk',detailKey:'timeRiskDetail',status:'info'});
      const ls200=rr.sma200[n-1],ls50=rr.sma50[n-1],s50a=n>10?rr.sma50[n-11]:null;
      const dec=ls50!=null&&s50a!=null&&ls50<s50a,bel=ls200!=null&&lat<ls200,dis=bel&&dec;
      if(dis)items.push({icon:'🔴',labelKey:'disasterHigh',detailKey:'disasterDetail',status:'danger'});
      else if(bel)items.push({icon:'🟡',labelKey:'trendRisk',detail:'Close<SMA200',status:'warn'});
      else items.push({icon:'🟢',labelKey:'trendNormal',detail:'Close>SMA200',status:'ok'});
      let biasKey='holdBias',bc='text-green-400';if(dis){biasKey='exitBias';bc='text-red-400';}else if(mr){biasKey='profitBias';bc='text-yellow-400';}
      return{items,biasKey,biasColor:bc};
    }

    function renderChart(data,rr){
      const ct=document.getElementById('chartContainer');
      if(resizeObserver){resizeObserver.disconnect();resizeObserver=null;}
      if(chartInstance){chartInstance.remove();chartInstance=null;}ct.innerHTML='';
      chartInstance=LightweightCharts.createChart(ct,{width:ct.clientWidth,height:ct.clientHeight||460,layout:{background:{type:'solid',color:'rgba(0,0,0,0)'},textColor:'rgba(255,255,255,0.3)',fontSize:11},grid:{vertLines:{color:'rgba(255,255,255,0.03)'},horzLines:{color:'rgba(255,255,255,0.03)'}},crosshair:{mode:0},rightPriceScale:{borderColor:'rgba(255,255,255,0.06)'},timeScale:{borderColor:'rgba(255,255,255,0.06)',timeVisible:false}});
      candleSeries=chartInstance.addCandlestickSeries({upColor:'#4ade80',downColor:'#f87171',borderUpColor:'#4ade80',borderDownColor:'#f87171',wickUpColor:'#4ade80',wickDownColor:'#f87171'});
      const cd=[];for(let i=0;i<data.dates.length;i++)cd.push({time:data.dates[i],open:data.opens[i],high:data.highs[i],low:data.lows[i],close:data.closes[i]});candleSeries.setData(cd);
      sma50Series=chartInstance.addLineSeries({color:'#f59e0b',lineWidth:1.5,priceLineVisible:false,lastValueVisible:true,title:'SMA50'});
      const d50=[];for(let i=0;i<data.dates.length;i++){if(rr.sma50[i]!=null)d50.push({time:data.dates[i],value:rr.sma50[i]});}sma50Series.setData(d50);
      sma200Series=chartInstance.addLineSeries({color:'#3b82f6',lineWidth:1.5,priceLineVisible:false,lastValueVisible:true,title:'SMA200'});
      const d200=[];for(let i=0;i<data.dates.length;i++){if(rr.sma200[i]!=null)d200.push({time:data.dates[i],value:rr.sma200[i]});}sma200Series.setData(d200);
      chartInstance.timeScale().fitContent();

    function updateCards(data,rr,sig,vix,vf){
      const n=data.closes.length,lat=data.closes[n-1],prev=n>1?data.closes[n-2]:lat,chg=lat-prev,cp=prev?((chg/prev)*100):0;
      document.getElementById('cardPrice').textContent=`$${lat.toFixed(2)}`;
      const ce=document.getElementById('cardPriceChange');ce.textContent=`${chg>=0?'+':''}${chg.toFixed(2)} (${chg>=0?'+':''}${cp.toFixed(2)}%)`;ce.className=`text-xs mt-0.5 ${chg>=0?'text-green-400/70':'text-red-400/70'}`;
      // 切換背景：漲→綠、跌→紅
      document.getElementById('bgScene').classList.toggle('bearish', chg<0);
      const se=document.getElementById('cardRegime'),sl=document.getElementById('cardRegimeLabel');se.textContent=rr.total;
      if(rr.total>=70){se.className='text-xl font-bold text-green-400';sl.textContent=t('bull');sl.className='text-xs mt-0.5 text-green-400/60';}
      else if(rr.total>=50){se.className='text-xl font-bold text-yellow-400';sl.textContent=t('caution');sl.className='text-xs mt-0.5 text-yellow-400/60';}
      else{se.className='text-xl font-bold text-red-400';sl.textContent=t('riskOff');sl.className='text-xs mt-0.5 text-red-400/60';}
      const r2e=document.getElementById('cardRSI2'),r2l=document.getElementById('cardRSI2Label');r2e.textContent=sig.rsi2!=null?sig.rsi2.toFixed(1):'N/A';
      if(sig.rsi2!=null){if(sig.rsi2<5){r2e.className='text-xl font-bold text-purple-400';r2l.textContent=t('extremeOS');}else if(sig.rsi2<10){r2e.className='text-xl font-bold text-red-400';r2l.textContent=t('severeOS');}else if(sig.rsi2<15){r2e.className='text-xl font-bold text-orange-400';r2l.textContent=t('oversold');}else if(sig.rsi2<30){r2e.className='text-xl font-bold text-yellow-400';r2l.textContent=t('low');}else{r2e.className='text-xl font-bold text-white/50';r2l.textContent=t('neutral');}}
      const de=document.getElementById('cardRSI2Days'),dl=document.getElementById('cardRSI2DaysLabel'),days=sig.rsi2ConsecDays;de.textContent=`${days} ${t('days')}`;
      if(days>=3){de.className='text-xl font-bold text-purple-400';dl.textContent=t('extremeRare');}else if(days>=2){de.className='text-xl font-bold text-orange-400';dl.textContent=t('deepOS');}else if(days>=1){de.className='text-xl font-bold text-yellow-400';dl.textContent=t('initialOS');}else{de.className='text-xl font-bold text-white/30';dl.textContent='--';}
      const ie=document.getElementById('cardIBS'),il=document.getElementById('cardIBSLabel');if(sig.ibs!=null){ie.textContent=sig.ibs.toFixed(2);if(sig.ibs<0.1){ie.className='text-xl font-bold text-red-400';il.textContent=t('extremeWeak');}else if(sig.ibs<0.2){ie.className='text-xl font-bold text-orange-400';il.textContent=t('weakClose');}else if(sig.ibs>0.8){ie.className='text-xl font-bold text-green-400';il.textContent=t('strongClose');}else{ie.className='text-xl font-bold text-white/50';il.textContent=t('neutral');}}
      const dve=document.getElementById('cardDeviation'),dvl=document.getElementById('cardDeviationLabel');if(sig.deviation!=null){dve.textContent=`${sig.deviation.toFixed(2)}%`;if(sig.deviation<-5){dve.className='text-xl font-bold text-purple-400';dvl.textContent=t('extremeDeviation');}else if(sig.deviation<-3){dve.className='text-xl font-bold text-red-400';dvl.textContent=t('clearPullback');}else if(sig.deviation<0){dve.className='text-xl font-bold text-yellow-400';dvl.textContent=t('belowMA');}else{dve.className='text-xl font-bold text-green-400';dvl.textContent=t('aboveMA');}}
      const ve=document.getElementById('cardVIX'),vl=document.getElementById('cardVIXLabel');if(vix&&vix.close!=null){ve.textContent=vix.close.toFixed(1);if(vf.vixStatus===t('normal')){ve.className='text-xl font-bold text-green-400';vl.textContent=t('normal');}else if(vf.vixStatus===t('alert')){ve.className='text-xl font-bold text-yellow-400';vl.textContent=t('alert');}else{ve.className='text-xl font-bold text-red-400';vl.textContent=t('highRisk');}}else{ve.textContent='N/A';ve.className='text-xl font-bold text-white/20';vl.textContent='--';}
      const sgC={tranche3:'text-purple-400',tranche2:'text-accent-light',tranche1:'text-brand-light',observe:'text-yellow-400',hedge:'text-red-400',none:'text-white/20'};
      const sgN={tranche3:t('sigT3'),tranche2:t('sigT2'),tranche1:t('sigT1'),observe:t('sigObs'),hedge:t('sigHedge'),none:'--'};
      const sge=document.getElementById('cardSignal'),sgl=document.getElementById('cardSignalLabel');
      sge.textContent=sgN[sig.signalLevel]||'--';sge.className=`text-xl font-bold ${sgC[sig.signalLevel]||''}`;
      sgl.textContent=sig.signalPosition&&sig.signalLevel.startsWith('tranche')?`${t('position')} ${sig.signalPosition}`:t(sig.signalTextKey)||'--';
    }

    function updateRegime(rr){

      const bar=document.getElementById('regimeScoreBar');bar.style.width=`${rr.total}%`;bar.className=`score-bar-fill ${rr.total>=70?'bg-green-500':rr.total>=50?'bg-yellow-500':'bg-red-500'}`;
      let html='',cur='';
      for(const it of rr.breakdown){
        const cat=t(it.catKey);
        if(cat!==cur){cur=cat;html+=`<div class="text-[10px] text-white/20 uppercase tracking-widest mt-3 mb-1">${cur}</div>`;}
        const cls=it.pass===null?'warn':it.pass?'pass':'fail',icon=it.pass===null?'⚪':it.pass?'✅':'❌';
        const label=it.labKey?t(it.labKey):it.label;

      const p=document.getElementById('signalPanel');

          desc:'A momentum oscillator created by J. Welles Wilder in 1978. Standard RSI uses a 14-day period; RSI(2) shortens it to 2 days, making it extremely sensitive to price changes and ideal for detecting short-term extremes.',

    window.showMetricInfo = function(key) {
      const info = METRIC_INFO[lang][key];
      if (!info) return;
      let html = `<h4>${info.title}</h4><p>${info.desc}</p>`;

      // RSI(2) 背景說明
      if (info.background) {
        html += `<p style="border-left:2px solid rgba(255,255,255,0.1);padding-left:10px;margin:12px 0;color:rgba(255,255,255,0.35);font-style:italic;">${info.background}</p>`;
      }

      // 計算公式（單行）
      if (info.formula) {
        html += `<div style="margin:12px 0 8px;"><div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">${lang==='zh'?'計算公式':'Formula'}</div>`;
        html += `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 12px;font-size:11px;color:#94a3b8;font-family:monospace;">${info.formula}</div></div>`;
      }

      // RSI 計算步驟
      if (info.formulaSteps) {
        html += `<div style="margin:12px 0 8px;"><div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">${lang==='zh'?'計算步驟':'Calculation Steps'}</div>`;
        html += `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 12px;font-size:11px;color:#94a3b8;font-family:monospace;line-height:1.8;">`;
        for (const s of info.formulaSteps) html += s + '<br>';
        html += `</div></div>`;
        if (info.formulaNote) html += `<p style="font-size:11px;color:rgba(255,255,255,0.3);margin:4px 0 12px;">💡 ${info.formulaNote}</p>`;
      }

      // Regime 加權明細表
      if (info.weights) {
        html += `<div style="margin:12px 0 8px;"><div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">${lang==='zh'?'加權明細':'Weighting Breakdown'}</div>`;
        for (const w of info.weights) {
          html += `<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;margin-bottom:4px;">`;
          html += `<div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:4px;">${w.cat} <span style="color:rgba(255,255,255,0.25);">(${lang==='zh'?'滿分':'max'} ${w.max})</span></div>`;
          for (const it of w.items) html += `<div style="font-size:10px;color:rgba(255,255,255,0.35);padding-left:8px;">• ${it}</div>`;
          html += `</div>`;
        }
        html += `</div>`;
      }

      // Regime 即時得分
      if (info.showLiveScore && lastRR) {
        html += `<div style="margin:12px 0 8px;"><div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">${lang==='zh'?'目前各項得分':'Current Scores'}</div>`;
        html += `<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:10px;">`;
        for (const it of lastRR.breakdown) {
          const label = it.labKey ? t(it.labKey) : it.label;
          const icon = it.pass === null ? '⚪' : it.pass ? '✅' : '❌';
          html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03);">`;
          html += `<span style="color:rgba(255,255,255,0.5);">${icon} ${label}</span>`;
          html += `<span style="font-weight:700;color:${it.pass?'#4ade80':it.pass===null?'#94a3b8':'#f87171'};">${it.pts} / ${it.max}</span>`;
          html += `</div>`;
        }
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0 0;font-size:13px;font-weight:700;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;">`;
        html += `<span style="color:rgba(255,255,255,0.7);">${lang==='zh'?'總分':'Total'}</span>`;
        const sc=lastRR.total,scCol=sc>=70?'#4ade80':sc>=50?'#facc15':'#f87171';
        html += `<span style="color:${scCol};">${sc} / 100</span></div></div></div>`;
      }

      // 區間
      html += `<div style="margin-top:12px;"><div style="font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">${lang==='zh'?'區間判讀':'Range Interpretation'}</div>`;
      for (const r of info.ranges) {
        html += `<div class="range-row" style="background:${r.bg}"><div class="range-dot" style="background:${r.color}"></div><div><div style="color:${r.color};font-weight:600;">${r.label}</div><div style="color:rgba(255,255,255,0.4);margin-top:2px;">${r.text}</div></div></div>`;
      }
      html += '</div>';

      document.getElementById('metricModalContent').innerHTML = html;
      document.getElementById('metricModal').classList.add('show');
    };

    // === 主流程 ===
    window.switchSymbol=function(s){if(isLoading)return;currentSymbol=s;document.querySelectorAll('#symbolTabs .tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.symbol===s));refreshData();};
    window.switchLang=function(l){
      lang=l;document.documentElement.lang=l==='zh'?'zh-Hant':'en';
      document.querySelectorAll('#langTabs .lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
      reRenderUI();
    };
    window.refreshData=async function(){
      if(isLoading)return;isLoading=true;const icon=document.getElementById('refreshIcon');icon.classList.add('spin');setStatus('loading',`${t('loadingStatus')} ${currentSymbol}...`);
      try{
        const[raw,vix,br]=await Promise.all([fetchWithRetry(currentSymbol),fetchVIX(),fetchBreadth(currentSymbol)]);
        const data=parseData(raw);if(data.closes.length<200)throw new Error(`Insufficient data (${data.closes.length})`);
        const rr=calcRegimeScore(data,vix,br),vf=calcVolFilter(vix,rr),sig=calcSignal(data,rr.total,vf),es=calcExit(data,rr,sig);
        lastData=data;lastRR=rr;lastSig=sig;lastVix=vix;lastVF=vf;lastExit=es;
        document.getElementById('chartTitle').textContent=`${currentSymbol} ${lang==='zh'?'日 K 線圖':'Daily Chart'} + SMA50 / SMA200`;
        renderChart(data,rr);updateCards(data,rr,sig,vix,vf);updateRegime(rr);updateChecklist(data,rr,sig,vix,vf);updateSignal(sig);updateBlock(sig);updateExit(es);
        setStatus('success');setLastUpdate();
      }catch(e){console.error('[D]',e);setStatus('error',e.message);}finally{isLoading=false;icon.classList.remove('spin');}
    };
    document.addEventListener('DOMContentLoaded',()=>{lucide.createIcons();applyStaticI18n();refreshData();});
  })();

  // 滑鼠光暈
  (function(){
    const glow=document.getElementById('cursorGlow');let active=false;
    document.addEventListener('mousemove',(e)=>{glow.style.transform=`translate(${e.clientX-250}px,${e.clientY-250}px)`;if(!active){active=true;glow.classList.add('active');}});
    document.addEventListener('mouseleave',()=>{active=false;glow.classList.remove('active');});
  })();
  </script>
</body>
