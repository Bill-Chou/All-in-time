name: Pulse Daily Signal

on:
  schedule:
    # 美東 4:30 PM = UTC 20:30（冬令）/ UTC 20:30（夏令 = 16:30 EDT）
    # GitHub Actions 用 UTC，美東夏令時 16:30 = UTC 20:30
    - cron: '30 20 * * 1-5'  # 週一到週五
  workflow_dispatch:  # 允許手動觸發

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Run Pulse Signal Check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cat << 'SCRIPT' > pulse.py
          import json, urllib.request, urllib.parse, math, sys, os
          from datetime import datetime, timezone, timedelta

          # ============================================================
          # Pulse Telegram 通知腳本
          # 每天美股收盤後自動計算指標並推送訊號
          # ============================================================

          TELEGRAM_TOKEN = os.environ.get('TELEGRAM_TOKEN', '')
          CHAT_ID = os.environ.get('TELEGRAM_CHAT_ID', '')
          SYMBOLS = ['SPY', 'QQQ']
          BREADTH = {'SPY': 'RSP', 'QQQ': 'QQEW'}

          def fetch(symbol):
              """從 Yahoo Finance 抓取 2 年日線數據"""
              url = f'https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?range=2y&interval=1d'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read())

          def parse(raw):
              """清洗 OHLCV 數據"""
              res = raw['chart']['result'][0]
              ts = res['timestamp']
              q = res['indicators']['quote'][0]
              d = {'dates':[], 'o':[], 'h':[], 'l':[], 'c':[], 'v':[]}
              for i in range(len(ts)):
                  if q['open'][i] is None or q['close'][i] is None:
                      continue
                  d['dates'].append(ts[i])
                  d['o'].append(q['open'][i])
                  d['h'].append(q['high'][i])
                  d['l'].append(q['low'][i])
                  d['c'].append(q['close'][i])
                  d['v'].append(q['volume'][i] or 0)
              return d

          def sma(data, period):
              r = []
              for i in range(len(data)):
                  if i < period - 1:
                      r.append(None)
                  else:
                      r.append(sum(data[i-period+1:i+1]) / period)
              return r

          def rsi(closes, period):
              r = [None] * len(closes)
              if len(closes) < period + 1:
                  return r
              ag = al = 0
              for i in range(1, period + 1):
                  d = closes[i] - closes[i-1]
                  if d > 0: ag += d
                  else: al += abs(d)
              ag /= period
              al /= period
              r[period] = 100 if al == 0 else 100 - 100/(1+ag/al)
              for i in range(period+1, len(closes)):
                  d = closes[i] - closes[i-1]
                  ag = (ag*(period-1) + (d if d > 0 else 0)) / period
                  al = (al*(period-1) + (abs(d) if d < 0 else 0)) / period
                  r[i] = 100 if al == 0 else 100 - 100/(1+ag/al)
              return r

          def williams_r(h, l, c, period):
              r = [None] * len(c)
              for i in range(period-1, len(c)):
                  hh = max(h[i-period+1:i+1])
                  ll = min(l[i-period+1:i+1])
                  r[i] = 0 if hh == ll else ((hh - c[i]) / (hh - ll)) * -100
              return r

          def realized_vol(c, period=20):
              r = [None] * len(c)
              lr = [0] + [math.log(c[i]/c[i-1]) for i in range(1, len(c))]
              for i in range(period, len(c)):
                  s = lr[i-period+1:i+1]
                  m = sum(s)/len(s)
                  v = sum((x-m)**2 for x in s)/(len(s)-1)
                  r[i] = math.sqrt(v) * math.sqrt(252) * 100
              return r

          def atr(h, l, c, period):
              tr = [h[0]-l[0]]
              for i in range(1, len(c)):
                  tr.append(max(h[i]-l[i], abs(h[i]-c[i-1]), abs(l[i]-c[i-1])))
              r = [None]*len(c)
              a = sum(tr[:period])/period
              r[period-1] = a
              for i in range(period, len(c)):
                  a = (a*(period-1)+tr[i])/period
                  r[i] = a
              return r

          def pctile_rank(data, idx, lookback):
              s = [data[i] for i in range(max(0,idx-lookback+1), idx+1) if data[i] is not None]
              if len(s) < 20 or data[idx] is None:
                  return None
              return sum(1 for v in s if v < data[idx]) / len(s) * 100

          def ibs(h, l, c):
              return [(c[i]-l[i])/(h[i]-l[i]) if h[i]!=l[i] else 0.5 for i in range(len(c))]

          def consec_days(arr, threshold):
              ct = 0
              for i in range(len(arr)-1, -1, -1):
                  if arr[i] is not None and arr[i] < threshold:
                      ct += 1
                  else:
                      break
              return ct

          def calc_regime(d, vix_close=None, vix_sma10=None, br_close=None, br_sma50=None):
              """計算 Regime Score"""
              c, h, l = d['c'], d['h'], d['l']
              n = len(c)
              lat = c[-1]
              s200 = sma(c, 200)
              s50 = sma(c, 50)
              rv = realized_vol(c, 20)
              at = atr(h, l, c, 14)
              score = 0
              details = []

              # A. 趨勢位置
              if s200[-1] and lat > s200[-1]: score += 15; details.append('✅ Close>SMA200 +15')
              else: details.append('❌ Close<SMA200 +0')
              if s50[-1] and lat > s50[-1]: score += 10; details.append('✅ Close>SMA50 +10')
              else: details.append('❌ Close<SMA50 +0')
              if s50[-1] and s200[-1] and s50[-1] > s200[-1]: score += 10; details.append('✅ SMA50>SMA200 +10')
              else: details.append('❌ SMA50<SMA200 +0')

              # B. 趨勢斜率
              if n>20 and s200[-1] and s200[-21] and s200[-1]>s200[-21]: score+=10; details.append('✅ SMA200↑ +10')
              else: details.append('❌ SMA200↓ +0')
              if n>10 and s50[-1] and s50[-11] and s50[-1]>s50[-11]: score+=10; details.append('✅ SMA50↑ +10')
              else: details.append('❌ SMA50↓ +0')

              # C. 波動健康度
              rvp = pctile_rank(rv, n-1, 252)
              if rvp is not None and rvp < 80: score+=10; details.append(f'✅ RV {rvp:.0f}th<80th +10')
              else: details.append(f'❌ RV {rvp:.0f}th≥80th +0' if rvp else '❌ RV N/A +0')
              ap = [at[i]/c[i]*100 if at[i] and c[i]>0 else None for i in range(n)]
              app = pctile_rank(ap, n-1, 252)
              if app is not None and app < 80: score+=10; details.append(f'✅ ATR% {app:.0f}th<80th +10')
              else: details.append(f'❌ ATR% {app:.0f}th≥80th +0' if app else '❌ ATR% N/A +0')

              # D. 風險偏好
              if br_close and br_sma50 and br_close > br_sma50: score+=10; details.append('✅ Breadth>SMA50 +10')
              else: details.append('❌ Breadth +0')
              if vix_close and vix_close < 25: score+=5; details.append(f'✅ VIX={vix_close:.1f}<25 +5')
              else: details.append(f'❌ VIX={vix_close:.1f}≥25 +0' if vix_close else '❌ VIX N/A +0')
              if vix_close and vix_close < 20: score+=5; details.append('✅ VIX<20 +5')
              else: details.append('❌ VIX≥20 +0')
              if vix_close and vix_sma10 and vix_sma10>0:
                  sr = vix_close/vix_sma10
                  if sr < 1.15: score+=5; details.append(f'✅ VIX/SMA10={sr:.2f}<1.15 +5')
                  else: details.append(f'❌ VIX/SMA10={sr:.2f}≥1.15 +0')

              return min(score, 100), details, s200, s50, rv, rvp

          def analyze(symbol):
              """分析單一標的，回傳訊號摘要"""
              try:
                  raw = fetch(symbol)
                  d = parse(raw)
              except Exception as e:
                  return f'❌ {symbol} 數據取得失敗: {e}'

              if len(d['c']) < 200:
                  return f'❌ {symbol} 數據不足（{len(d["c"])}筆）'

              c, h, l = d['c'], d['h'], d['l']
              n = len(c)
              lat = c[-1]
              prev = c[-2] if n > 1 else lat
              chg = lat - prev
              chg_pct = (chg / prev) * 100 if prev else 0

              # VIX
              vix_close = vix_sma10 = None
              try:
                  vr = parse(fetch('^VIX'))
                  vc = [x for x in vr['c'] if x is not None]
                  vix_close = vc[-1]
                  vs = sma(vc, 10)
                  vix_sma10 = vs[-1] or vc[-1]
              except: pass

              # Breadth
              br_close = br_sma50 = None
              bp = BREADTH.get(symbol)
              if bp:
                  try:
                      br = parse(fetch(bp))
                      bc = [x for x in br['c'] if x is not None]
                      br_close = bc[-1]
                      bs = sma(bc, 50)
                      br_sma50 = bs[-1] or bc[-1]
                  except: pass

              # Regime
              score, details, s200, s50, rv, rvp = calc_regime(d, vix_close, vix_sma10, br_close, br_sma50)

              # 指標
              rsi2 = rsi(c, 2)
              rsi5 = rsi(c, 5)
              wr2 = williams_r(h, l, c, 2)
              ibs_arr = ibs(h, l, c)
              sma20 = sma(c, 20)
              lr2 = rsi2[-1]
              lr5 = rsi5[-1]
              lwr = wr2[-1]
              libs = ibs_arr[-1]
              dev = ((lat - sma20[-1]) / sma20[-1] * 100) if sma20[-1] else None
              days = consec_days(rsi2, 10)

              # 波動濾網
              vol_blocked = False
              vol_reason = ''
              if vix_close and vix_close >= 32:
                  vol_blocked = True
                  vol_reason = f'VIX={vix_close:.1f}≥32'
              if rvp and rvp >= 90:
                  vol_blocked = True
                  vol_reason = f'RV {rvp:.0f}th≥90th'

              # 訊號
              if score < 50:
                  signal = '🔴 避險'
                  signal_detail = f'Regime={score}<50'
              elif vol_blocked:
                  signal = '🔴 避險（波動）'
                  signal_detail = vol_reason
              elif score >= 75 and lr2 is not None and lr2 < 5:
                  signal = '🟣 第三層（極端失衡）'
                  signal_detail = '建議倉位 100%'
              elif score >= 70 and lr2 is not None and lr2 < 8:
                  signal = '🔵 第二層（恐慌加碼）'
                  signal_detail = '累計倉位 60%'
              elif score >= 70 and lr2 is not None and lr2 < 15:
                  signal = '🟢 第一層（試單）'
                  signal_detail = '建議倉位 30%'
              elif score >= 50:
                  signal = '🟡 觀察'
                  signal_detail = '尚未達極端超賣'
              else:
                  signal = '⚪ 無訊號'
                  signal_detail = ''

              # 出場參考
              sma5 = sma(c, 5)
              exit_bias = '續抱'
              if lr2 and lr2 > 65 or (sma5[-1] and lat > sma5[-1]):
                  exit_bias = '準備獲利了結'
              if s200[-1] and lat < s200[-1]:
                  s50_10 = s50[-11] if n > 10 else None
                  if s50[-1] and s50_10 and s50[-1] < s50_10:
                      exit_bias = '⚠️ 準備風險退出'

              # 是否觸發進場
              is_entry = signal.startswith(('🟣','🔵','🟢'))

              # 漲跌符號
              arrow = '📈' if chg >= 0 else '📉'

              # 組裝訊息
              lines = []
              chg_sign = '+' if chg >= 0 else ''
              pct_sign = '+' if chg_pct >= 0 else ''
              lines.append(f'{arrow} *{symbol}* `${lat:.2f}` ({chg_sign}{chg:.2f}, {pct_sign}{chg_pct:.2f}%)')
              lines.append('')
              regime_icon = '\U0001f7e2' if score>=70 else '\U0001f7e1' if score>=50 else '\U0001f534'
              lines.append(f'\U0001f3db *Regime Score:* `{score}/100` {regime_icon}')
              lr2_str = f'{lr2:.1f}' if lr2 is not None else 'N/A'
              lr5_str = f'{lr5:.1f}' if lr5 is not None else 'N/A'
              lines.append(f'\U0001f4ca *RSI(2):* `{lr2_str}` | RSI(5): `{lr5_str}`')
              lines.append(f'\U0001f522 *RSI(2) <10:* `{days}d`')
              dev_str = f'{dev:.2f}%' if dev is not None else 'N/A'
              lines.append(f'\U0001f4cf *IBS:* `{libs:.2f}` | Dev: `{dev_str}`')
              vix_str = f'{vix_close:.1f}' if vix_close else 'N/A'
              vix_icon = '\U0001f7e2' if vix_close and vix_close<25 else '\U0001f7e1' if vix_close and vix_close<32 else '\U0001f534'
              lines.append(f'\U0001f525 *VIX:* `{vix_str}` {vix_icon}')
              if lwr is not None:
                  lines.append(f'%R(2): `{lwr:.1f}`')
              lines.append('')
              lines.append(f'*Signal: {signal}*')
              if signal_detail:
                  lines.append(signal_detail)
              if exit_bias:
                  lines.append(f'Exit bias: {exit_bias}')
              msg = '\n'.join(lines)
              return msg, is_entry

          def send_telegram(text):
              """發送 Telegram 訊息"""
              url = f'https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage'
              data = urllib.parse.urlencode({
                  'chat_id': CHAT_ID,
                  'text': text,
                  'parse_mode': 'Markdown',
                  'disable_web_page_preview': 'true',
              }).encode()
              try:
                  req = urllib.request.Request(url, data=data)
                  urllib.request.urlopen(req, timeout=15)
                  print('Telegram 訊息發送成功')
              except Exception as e:
                  print(f'Telegram 發送失敗: {e}')

          # === 主流程 ===
          if __name__ == '__main__':
              now = datetime.now(timezone(timedelta(hours=-4)))  # 美東時間
              header = f"📡 *Pulse 每日報告*\n{now.strftime('%Y-%m-%d %H:%M')} ET\n{'─'*24}"
              messages = [header]
              has_entry = False

              for sym in SYMBOLS:
                  try:
                      result = analyze(sym)
                      if isinstance(result, tuple):
                          msg, entry = result
                          messages.append(msg)
                          if entry:
                              has_entry = True
                      else:
                          messages.append(result)
                  except Exception as e:
                      messages.append(f'❌ {sym} 分析失敗: {e}')

              if has_entry:
                  messages.insert(1, '🚨 *有進場訊號觸發！*\n')

              messages.append(f"\n🔗 [開啟 Dashboard](https://bill-chou.github.io/All-in-time/)")
              full_msg = '\n\n'.join(messages)
              send_telegram(full_msg)
              print('=== 完成 ===')
          SCRIPT
          python3 pulse.py
